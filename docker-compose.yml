version: '3.8'

services:
  # Servidor de Astro (React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4321:4321"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

  # Servidor PHP (Backend)
  backend:
    image: php:8.2-apache
    ports:
      - "8081:80"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - db # Espera a que la base de datos esté lista
    # Instalamos la extensión PDO de MySQL para que PHP pueda conectarse orientada a objetos
    command: >
      sh -c "docker-php-ext-install pdo pdo_mysql && apache2-foreground"

  # Base de datos MySQL
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: ferreteria_db
      MYSQL_USER: jony_user
      MYSQL_PASSWORD: jony_password
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: